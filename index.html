<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Popurrí | Menú Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #000; --card: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: #fff; font-family: 'Inter', sans-serif; }

        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #111; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.8rem; color: var(--gold); }
        .tag { font-size: 10px; letter-spacing: 4px; color: #444; text-transform: uppercase; }

        nav { position: sticky; top: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 100; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .scroll { display: flex; gap: 10px; overflow-x: auto; justify-content: center; }
        .scroll::-webkit-scrollbar { display: none; }
        .btn { background: transparent; border: 1px solid #222; color: #666; padding: 8px 15px; font-size: 10px; text-transform: uppercase; cursor: pointer; }
        .btn.active { border-color: var(--gold); color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .item { background: var(--card); border: 1px solid #111; border-radius: 8px; overflow: hidden; }

        .img-container { width: 100%; height: 250px; background: #050505; position: relative; }
        .item-img { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block; opacity: 0; transition: opacity 0.5s ease-in;
        }

        .info { padding: 20px; }
        .name { font-family: 'Cinzel', serif; font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        .desc { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 15px; height: 36px; overflow: hidden; }
        .bottom { display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: 700; color: var(--gold); font-size: 1.1rem; }
        .add { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-size: 10px; font-weight: 800; border-radius: 4px; }

        footer { padding: 40px; text-align: center; font-size: 9px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <header>
        <div class="tag">Next-Gen Menu</div>
        <h1>Popurrí</h1>
    </header>

    <nav>
        <div class="scroll">
            <button class="btn active" onclick="filter('all')">Todo</button>
            <button class="btn" onclick="filter('brunch')">Brunch</button>
            <button class="btn" onclick="filter('bebidas')">Bebidas</button>
        </div>
    </nav>

    <div class="grid" id="grid"></div>

    <footer>ZENITH CODE ARCHITECTURE 2026</footer>

    <script>
        // Fíjate cómo ahora uso enlaces "https://" para asegurar que carguen
        const products = [
            { id: 1, cat: 'brunch', name: 'Elite Burger', desc: 'Carne premium y pan artesanal.', price: 185, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80' },
            { id: 2, cat: 'brunch', name: 'Diamond Pancakes', desc: 'Frutos rojos y miel de agave.', price: 145, img: 'https://images.unsplash.com/photo-1528207776546-384cb1119b27?auto=format&fit=crop&w=500&q=80' },
            { id: 3, cat: 'bebidas', name: 'Mixology Refresher', desc: 'Cítricos y hierbas frescas.', price: 95, img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=500&q=80' },
            { id: 4, cat: 'brunch', name: 'Avocado Zenith', desc: 'Aguacate y huevo pochado.', price: 130, img: 'https://images.unsplash.com/photo-1525351484163-7529414344d8?auto=format&fit=crop&w=500&q=80' },
            { id: 5, cat: 'brunch', name: 'Chilaquiles Elite', desc: 'Salsa verde y crema de rancho.', price: 158, img: 'https://images.unsplash.com/photo-1626200419199-391ae4be7a41?auto=format&fit=crop&w=500&q=80' },
            { id: 6, cat: 'brunch', name: 'Pearl Bowl', desc: 'Yogurt griego y granola.', price: 120, img: 'https://images.unsplash.com/photo-1493770348161-369560ae357d?auto=format&fit=crop&w=500&q=80' }
        ];

        function render(cat) {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            const list = cat === 'all' ? products : products.filter(p => p.cat === cat);

            list.forEach(p => {
                container.innerHTML += `
                    <div class="item">
                        <div class="img-container">
                            <img src="${p.img}" class="item-img" onload="this.style.opacity=1">
                        </div>
                        <div class="info">
                            <h3 class="name">${p.name}</h3>
                            <p class="desc">${p.desc}</p>
                            <div class="bottom">
                                <span class="price">$${p.price}</span>
                                <button class="add">Añadir</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(cat);
        }

        render('all');
    </script>
</body>
</html>
